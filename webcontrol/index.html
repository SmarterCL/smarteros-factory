<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmarterBot - Web Control</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.2);
            padding: 40px;
            border-radius: 20px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.1em; opacity: 0.9; }
        .status { margin-top: 20px; font-size: 0.9em; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎛️ SmarterBot Control</h1>
        <p>Web Control Panel</p>
        <div class="status">
            <p>Sistema: <strong style="color: #4ade80;">🟢 OPERATIONAL</strong></p>
            <p>Bot: Activating...</p>
        </div>
    </div>
</body>
</html>
